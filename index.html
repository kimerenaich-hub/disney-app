  notes:{}, history:{}, photos:{}, dayMemo:"", tripDate:"",

};

function loadData() {
  try {
    const baked = window.BAKED_PHOTOS || {};
    const bakedAll = window.BAKED_DATA || null;
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // localStorageが空 → bakedファイルから全データ復元
      if (bakedAll) return { ...INITIAL_DATA, ...bakedAll, photos: { ...baked, ...(bakedAll.photos||{}) } };
      return { ...INITIAL_DATA, photos: { ...baked } };
    }
    const parsed = JSON.parse(raw);
    const photos = { ...baked, ...(parsed.photos||{}) };
    return { ...INITIAL_DATA, ...parsed,
      users: parsed.users || INITIAL_DATA.users,
      notes: parsed.notes||{}, history: parsed.history||{},
      photos,
      restaurantFavorites: parsed.restaurantFavorites||{},
      restaurantVisited: parsed.restaurantVisited||{},
      hotelFavorites: parsed.hotelFavorites||{},
      hotelStayed: parsed.hotelStayed||{},
      starRatings: parsed.starRatings||{},
      waitTimes: parsed.waitTimes||{},
      timeline: parsed.timeline||{},
      darkMode: parsed.darkMode||false,
      tripLogs: parsed.tripLogs||[],
      plan: parsed.plan||{},
    };
  } catch { return { ...INITIAL_DATA, photos: window.BAKED_PHOTOS||{} }; }
}
function saveData(d) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  } catch(e) {
    if (e.name === 'QuotaExceededError' || e.code === 22 || e.code === 1014) {
      alert('⚠️ 保存容量が不足しています。\n設定の「写真を圧縮して再保存」を実行してください。');
    }
  }
}

function compressImage(dataUrl, maxWidth=900, quality=0.72) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
function calcCountdown(dt) {
  if (!dt) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dt); d.setHours(0,0,0,0);
  return Math.ceil((d-t)/86400000);
}

    const file = e.target.files[0];

    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const text = ev.target.result;
        if (!text || text.trim().length === 0) {
          alert("ファイルが空です。正しいbaked_data.jsを選んでください。"); return;

        const tmp = {};

          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); return true; }

        };
        if (trySave(merged)) {
          alert("復元しました！アプリを再読み込みします。");

          catch(e) { compressedPhotos[key] = allPhotos[key]; }
        }

              ＋ メンバーを追加

        <button onClick={save} style={{width:"100%",padding:"13px",background:"#1a237e",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginTop:"6px"}}>保存する</button>

        <div style={{marginTop:"16px",borderTop:`1px solid ${C.bd}`,paddingTop:"16px"}}>

          {Object.keys(data.photos||{}).length>0&&(
            <button onClick={compressAll} disabled={compressing} style={{width:"100%",padding:"11px",background:compressing?"#78909c":"#00796b",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"12px",cursor:compressing?"not-allowed":"pointer",transition:"background 0.3s",marginBottom:"8px"}}>

            {window.BAKED_DATA ? "🔁 バックアップから復元する" : "🔁 復元（バックアップなし）"}

  );
}

// ─── Day Tab ─────────────────────────────────────────────────────────────
function DayTab({ data, park, onOpen, onChange }) {
  const C = useC();
  const users = data.users || INITIAL_DATA.users;
  const attrs = DATA[park];
  const [memo, setMemo] = useState(data.dayMemo||"");
  const handleMemoChange = (e) => { setMemo(e.target.value); onChange("dayMemo", e.target.value); };
  const [saved, setSaved] = useState(false);

  const saveTripLog = () => {
    const riddenIds = attrs.filter(a=>users.every(u=>data.ridden[a.id]?.[u.id])).map(a=>a.id);
    const eatenIds = restaurants.filter(r=>(data.restaurantVisited||{})[r.id]).map(r=>r.id);
    const stayedIds = HOTELS[park].filter(h=>(data.hotelStayed||{})[h.id]).map(h=>h.id);
    const log = { date: data.tripDate||new Date().toISOString().slice(0,10), park, memo: data.dayMemo||"", ridden: riddenIds, eaten: eatenIds, stayed: stayedIds };
    onChange("tripLogs", [...(data.tripLogs||[]), log]);
    setSaved(true); setTimeout(()=>setSaved(false), 2500);
  };

  const wantList = attrs.filter(a=>(data.plan||{})[a.id]);
  const dpa3 = wantList.filter(a=>a.dpa>=3).sort((a,b)=>b.dpa-a.dpa);
  const pp = wantList.filter(a=>a.pp>0&&a.dpa<3).sort((a,b)=>b.pp-a.pp);
  const dpa2 = wantList.filter(a=>a.dpa===2&&a.pp===0);

  const restaurants = RESTAURANTS[park];
  const favRestaurants = restaurants.filter(r=>(data.restaurantFavorites||{})[r.id]);

  const toggleRide = (a) => {
    const done = users.every(u=>data.ridden[a.id]?.[u.id]);
    onChange("ridden",{...data.ridden,[a.id]: Object.fromEntries(users.map(u=>[u.id,!done]))});
  };
  const removeWant = (a) => onChange("plan",{...(data.plan||{}),[a.id]:false});
  const toggleEat = (r) => {
    const eaten = (data.restaurantVisited||{})[r.id];
    onChange("restaurantVisited",{...(data.restaurantVisited||{}),[r.id]:!eaten});
  };
  const removeFavRestaurant = (r) => onChange("restaurantFavorites",{...(data.restaurantFavorites||{}),[r.id]:false});

  const favHotels = HOTELS[park].filter(h=>(data.hotelFavorites||{})[h.id]);
  const toggleStay = (h) => {
    const stayed = (data.hotelStayed||{})[h.id];
    onChange("hotelStayed",{...(data.hotelStayed||{}),[h.id]:!stayed});
  };
  const removeFavHotel = (h) => onChange("hotelFavorites",{...(data.hotelFavorites||{}),[h.id]:false});


  const sc = { background:C.card, borderRadius:"14px", padding:"14px 16px", marginBottom:"12px", boxShadow:C.shadow };

  const RestaurantDayCard = ({r}) => {
    const eaten = (data.restaurantVisited||{})[r.id];
    return (
      <div style={{background:eaten?(C.dark?"#064e3b":"#f0fdf4"):C.card,borderRadius:"14px",padding:"14px",marginBottom:"10px",boxShadow:C.shadow,border:eaten?`1px solid #86efac`:`1px solid ${C.bd}`,display:"flex",alignItems:"center",gap:"12px"}}>
        <span style={{fontSize:"32px"}}>{r.emoji}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",fontSize:"14px",color:C.text}}>{r.name}</div>
          <div style={{fontSize:"11px",color:C.sub}}>{r.area} · {r.cat} · {r.price}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px",flexShrink:0}}>
          <button onClick={()=>toggleEat(r)} style={{padding:"10px 14px",background:eaten?"#4caf50":"#e65100",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>{eaten?"✓ 行った":"行った？"}</button>
          <button onClick={()=>removeFavRestaurant(r)} style={{padding:"8px 14px",background:"#fce4ec",color:"#e57373",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"12px",cursor:"pointer"}}>削除</button>
        </div>
      </div>
    );
  };

  const DayCard = ({a}) => {
    const rid = data.ridden[a.id]||{};
    const done = users.every(u=>rid[u.id]);
    return (
      <div style={{background:done?(C.dark?"#064e3b":"#f0fdf4"):C.card,borderRadius:"14px",padding:"14px",marginBottom:"10px",boxShadow:C.shadow,border:done?`1px solid #86efac`:`1px solid ${C.bd}`,display:"flex",alignItems:"center",gap:"12px"}}>
        <span style={{fontSize:"32px"}}>{a.emoji}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:"700",fontSize:"14px",color:C.text}}>{a.name}</div>
          <div style={{fontSize:"11px",color:C.sub}}>{a.area} · {a.dur}</div>
          {a.dpa>=3&&<span style={{fontSize:"10px",background:"#fff3e0",color:"#e65100",borderRadius:"6px",padding:"1px 7px",fontWeight:"700",display:"inline-block",marginTop:"3px"}}>⚡ DPA最優先</span>}
          {a.dpa===2&&<span style={{fontSize:"10px",background:"#fff8e1",color:"#f57f17",borderRadius:"6px",padding:"1px 7px",fontWeight:"700",display:"inline-block",marginTop:"3px"}}>🟡 DPA推奨</span>}
          {a.pp>0&&a.dpa<2&&<span style={{fontSize:"10px",background:"#e8f5e9",color:"#2e7d32",borderRadius:"6px",padding:"1px 7px",fontWeight:"700",display:"inline-block",marginTop:"3px"}}>🟢 PP推奨</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px",flexShrink:0}}>
          <button onClick={()=>toggleRide(a)} style={{padding:"10px 14px",background:done?"#4caf50":"#1a237e",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>{done?"✓ 乗った":"乗った？"}</button>
          <button onClick={()=>removeWant(a)} style={{padding:"8px 14px",background:"#fce4ec",color:"#e57373",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"12px",cursor:"pointer"}}>削除</button>
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* 日付 */}
      <div style={{marginBottom:"12px",background:data.tripDate?"#1a237e":C.card,borderRadius:"14px",boxShadow:C.shadow,border:data.tripDate?"none":`2px dashed ${C.bd}`,padding:"16px 20px",display:"flex",alignItems:"center",gap:"14px"}}>
        <span style={{fontSize:"44px",flexShrink:0}}>📅</span>
        <div style={{flex:1}}>
          <p style={{fontSize:"11px",fontWeight:"700",color:data.tripDate?"rgba(255,255,255,0.6)":C.sub,marginBottom:"4px"}}>旅行日</p>
          <input type="date" value={data.tripDate||""} onChange={e=>onChange("tripDate",e.target.value)}
            style={{background:"transparent",border:"none",outline:"none",fontSize:"20px",fontWeight:"900",color:data.tripDate?"#fff":C.text,width:"100%",cursor:"pointer",WebkitAppearance:"none",padding:0}}/>
        </div>
      </div>

      {/* 履歴に記録 */}
      <button onClick={saveTripLog} style={{width:"100%",background:saved?"#4caf50":"#37474f",color:"#fff",border:"none",borderRadius:"14px",padding:"14px",fontWeight:"700",cursor:"pointer",fontSize:"14px",transition:"background 0.3s",marginBottom:"12px"}}>
        {saved?"✓ 記録しました！":"📖 履歴に記録"}
      </button>

      {/* メモ */}
      <div style={sc}>
        <p style={{fontSize:"15px",fontWeight:"800",color:C.text,marginBottom:"10px"}}>📝 当日メモ</p>
        <textarea style={S.textarea(C)} value={memo} placeholder="" onChange={handleMemoChange}/>
      </div>

      {/* 当日計画一覧 */}
      <p style={{fontWeight:"800",fontSize:"15px",color:C.text,marginBottom:"10px"}}>📋 当日計画一覧</p>
      {wantList.length===0&&favRestaurants.length===0&&favHotels.length===0?(
        <div style={{textAlign:"center",color:"#aaa",padding:"30px 0 20px"}}>
          <p style={{fontSize:"36px"}}>⭐</p>
          <p style={{fontSize:"14px",marginTop:"8px"}}>一覧タブで「行きたい！」を追加しよう</p>
        </div>
      ):<>
        {wantList.length>0&&<>
          {(favRestaurants.length>0||favHotels.length>0)&&<p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"8px"}}>🎡 アトラクション</p>}
          {wantList.map(a=><DayCard key={a.id} a={a}/>)}
        </>}
        {favRestaurants.length>0&&<>
          <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,margin:"12px 0 8px"}}>🍴 グルメ</p>
          {favRestaurants.map(r=><RestaurantDayCard key={r.id} r={r}/>)}
        </>}
        {favHotels.length>0&&<>
          <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,margin:"12px 0 8px"}}>🛎️ ホテル</p>
          {favHotels.map(h=>{
            const stayed=(data.hotelStayed||{})[h.id];
            return(
              <div key={h.id} style={{background:stayed?(C.dark?"#064e3b":"#f0fdf4"):C.card,borderRadius:"14px",padding:"14px",marginBottom:"10px",boxShadow:C.shadow,border:stayed?`1px solid #86efac`:`1px solid ${C.bd}`,display:"flex",alignItems:"center",gap:"12px"}}>
                <span style={{fontSize:"32px"}}>{h.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:"700",fontSize:"14px",color:C.text}}>{h.name}</div>
                  <div style={{fontSize:"11px",color:C.sub}}>{h.type} · {h.price}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"6px",flexShrink:0}}>
                  <button onClick={()=>toggleStay(h)} style={{padding:"10px 14px",background:stayed?"#4caf50":"#1a237e",color:"#fff",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>{stayed?"✓ 泊まった":"泊まった？"}</button>
                  <button onClick={()=>removeFavHotel(h)} style={{padding:"8px 14px",background:"#fce4ec",color:"#e57373",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"12px",cursor:"pointer"}}>削除</button>
                </div>
              </div>
            );
          })}
        </>}
      </>}

      {/* DPA/PPガイド */}
      {dpa3.length>0&&(
        <div style={{...sc,marginTop:"16px",background:C.dark?"#3b1515":"#fff5f5",border:"1px solid #ffcdd2"}}>
          <p style={{fontWeight:"800",color:"#e53935",marginBottom:"6px",fontSize:"14px"}}>🔴 STEP1: 入場直後にDPAを取得</p>
          <p style={{fontSize:"12px",color:C.sub,marginBottom:"10px"}}>入場したらすぐにDPA（ディズニー・プレミアアクセス）を購入！売り切れ前に。</p>
          {dpa3.map(a=>{const rid=data.ridden[a.id]||{};return(
            <div key={a.id} onClick={()=>onOpen(a)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>
              <span style={{fontSize:"22px"}}>{a.emoji}</span>
              <div style={{flex:1}}><div style={{fontWeight:"700",fontSize:"13px",color:C.text}}>{a.name}</div><div style={{fontSize:"11px",color:C.sub}}>{a.area} · {a.dur}</div><span style={{fontSize:"10px",background:"#e53935",color:"#fff",borderRadius:"6px",padding:"1px 6px",fontWeight:"700"}}>🔴 DPA即取得</span></div>
              {users.every(u=>rid[u.id])&&<span style={{color:"#4caf50",fontWeight:"700",fontSize:"16px"}}>✓</span>}
            </div>
          );})}
        </div>
      )}
      {pp.length>0&&(
        <div style={{...sc,background:C.dark?"#2d2000":"#fffde7",border:"1px solid #ffe082"}}>
          <p style={{fontWeight:"800",color:"#f57c00",marginBottom:"6px",fontSize:"14px"}}>🟡 STEP2: プライオリティパスを取得</p>

          {pp.map(a=>{const rid=data.ridden[a.id]||{};return(
            <div key={a.id} onClick={()=>onOpen(a)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>

              <div style={{flex:1}}><div style={{fontWeight:"700",fontSize:"13px",color:C.text}}>{a.name}</div><div style={{fontSize:"11px",color:C.sub}}>{a.area} · {a.dur}</div><span style={{fontSize:"10px",background:"#ff8f00",color:"#fff",borderRadius:"6px",padding:"1px 6px",fontWeight:"700"}}>🟡 PP推奨</span></div>
              {users.every(u=>rid[u.id])&&<span style={{color:"#4caf50",fontWeight:"700"}}>✓</span>}
            </div>

      {dpa2.length>0&&(
        <div style={{...sc,background:C.dark?"#1a1f2d":"#f3f4ff",border:"1px solid #c5cae9"}}>

          {dpa2.map(a=>{const rid=data.ridden[a.id]||{};return(
            <div key={a.id} onClick={()=>onOpen(a)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>

              <div style={{flex:1}}><div style={{fontWeight:"700",fontSize:"13px",color:C.text}}>{a.name}</div><div style={{fontSize:"11px",color:C.sub}}>{a.area} · {a.dur}</div></div>

        </div>
      )}
    </div>
  );
}

// ─── Attractions Tab ──────────────────────────────────────────────────────
function AttractionsTab({ data, park, onOpen, onChange }) {
  const C = useC();
  const users = data.users || INITIAL_DATA.users;
  const [areaFilter, setAreaFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [tagFilter, setTagFilter] = useState("all");
  const attrs = DATA[park];
  const areas = [...new Set(attrs.map(a=>a.area))];

  const handleReset = () => {
    if (!window.confirm("乗った・行った・いいね・当日計画・当日メモ・日付をリセットしますか？\n（旅の記録・写真は残ります）")) return;
    onChange("ridden", {});
    onChange("restaurantVisited", {});
    onChange("want", {});
    onChange("plan", {});
    onChange("restaurantFavorites", {});
    onChange("dayMemo", "");
    onChange("tripDate", "");
  };

  const filtered = attrs.filter(a=>{
    if (areaFilter!=="all"&&a.area!==areaFilter) return false;
    if (tagFilter!=="all"&&!a.tags.includes(tagFilter)) return false;
    const w=data.want[a.id]||{}, r=data.ridden[a.id]||{};
    if (statusFilter==="plan") return !!(data.plan||{})[a.id];
    if (statusFilter==="want") return users.some(u=>w[u.id]);
    if (statusFilter==="both") return users.every(u=>w[u.id]);
    if (statusFilter==="unridden") return !users.some(u=>r[u.id]);
    if (statusFilter==="visited") return users.some(u=>r[u.id]);
    return true;
  }).sort((a,b)=>{
    if (statusFilter==="want"||statusFilter==="both") {
      const wa=data.want[a.id]||{}, wb=data.want[b.id]||{};
      return users.filter(u=>wb[u.id]).length - users.filter(u=>wa[u.id]).length;
    }
    return 0;
  });

  const gridCard=(s,dark,inPlan,allWant)=>({
    background:s==="ridden"?(dark?"#064e3b":"#f0fdf4"):inPlan?(dark?"#3d3200":"#fffde7"):dark?"#1f2937":"#f5f5f5",
    borderRadius:"14px", overflow:"hidden", cursor:"pointer", position:"relative",
    border:s==="ridden"?`2px solid #86efac`:(inPlan||allWant)?`2px solid #ffd700`:`1px solid ${dark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)"}`,
  });

  return (
    <div>
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"8px",alignItems:"center"}}>
        <button style={S.chip(areaFilter==="all",C)} onClick={()=>setAreaFilter("all")}>すべて</button>
        {areas.map(a=><button key={a} style={S.chip(areaFilter===a,C)} onClick={()=>setAreaFilter(a)}>{a}</button>)}
      </div>
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"8px",alignItems:"center"}}>
        {[["all","すべて"],["popular","🔥人気"],["thrill","⚡スリル"],["show","🎭ショー"]].map(([k,l])=>(
          <button key={k} style={S.chip(tagFilter===k,C)} onClick={()=>setTagFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"10px"}}>
        {[["all","すべて"],["plan","📅当日"],["want","投票あり"],["both",users.length===1?"行く！":"全員とも！"],["unridden","未乗車"],["visited","訪問済み"]].map(([k,l])=>(
          <button key={k} style={S.chip(statusFilter===k,C)} onClick={()=>setStatusFilter(k)}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>
        {filtered.map(a=>{
          const r=data.ridden[a.id]||{}, w=data.want[a.id]||{};
          const anyRidden=users.some(u=>r[u.id]);
          const bothRidden=users.every(u=>r[u.id]);
          const allWant=users.every(u=>w[u.id]);
          const anyWant=users.some(u=>w[u.id]);
          const inPlan=!!(data.plan||{})[a.id];
          const ow=anyWant&&!allWant;
          const s=bothRidden?"ridden":allWant?"both":"normal";
          return (
            <div key={a.id} onClick={()=>onOpen(a)} style={gridCard(s,C.dark,inPlan,allWant)}>
              {bothRidden&&<div style={{position:"absolute",top:"6px",left:"6px",background:"#4caf50",color:"#fff",borderRadius:"8px",padding:"2px 6px",fontSize:"10px",fontWeight:"700"}}>✓乗った</div>}
              {!bothRidden&&allWant&&<div style={{position:"absolute",top:"6px",left:"6px",background:"#f5a623",color:"#fff",borderRadius:"8px",padding:"2px 6px",fontSize:"10px",fontWeight:"700"}}>{users.length===1?"行く！":"全員！"}</div>}
              {!bothRidden&&!allWant&&anyWant&&<div style={{position:"absolute",top:"6px",left:"6px",background:"#2196f3",color:"#fff",borderRadius:"8px",padding:"2px 6px",fontSize:"10px",fontWeight:"700"}}>予定</div>}
              {inPlan&&!bothRidden&&<div style={{position:"absolute",top:"6px",right:"6px",background:"#f5a623",color:"#fff",borderRadius:"6px",padding:"2px 5px",fontSize:"9px",fontWeight:"700"}}>📅</div>}
              {!anyRidden&&a.dpa>=2&&!anyWant&&!inPlan&&<div style={{position:"absolute",top:"6px",right:"6px",background:"#e53935",color:"#fff",borderRadius:"6px",padding:"2px 5px",fontSize:"9px",fontWeight:"700"}}>DPA</div>}
              {(data.photos||{})[a.id]
                ? <div style={{height:"80px",overflow:"hidden",borderRadius:"10px 10px 0 0"}}><img src={(data.photos||{})[a.id]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>
                : <ImgOrEmoji imgUrl={a.imgUrl} emoji={a.emoji} cardMode={true}/>
              }
              <div style={{padding:"0 8px 10px"}}>
                <div style={{fontSize:"11px",fontWeight:"700",color:C.text,lineHeight:1.4,marginBottom:"4px",wordBreak:"break-all"}}>{a.name}</div>
                <div>{a.tags.filter(t=>t!=="family").slice(0,2).map(t=><span key={t} style={S.tag(TAG_COLORS[t]||"#888")}>{TAG_LABELS[t]||t}</span>)}</div>
                {anyWant&&<div style={{marginTop:"4px"}}>{users.map((u,i)=>{const c=USER_COLORS[i]||USER_COLORS[0];return w[u.id]?<span key={u.id} style={S.pillUser(c.bg,c.fg,true)}>{u.name} 👍</span>:null;})}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:"40px"}}><p style={{fontSize:"14px"}}>該当するアトラクションがありません</p></div>}
      <div style={{marginTop:"24px",paddingTop:"16px",borderTop:`1px solid ${C.bd}`,textAlign:"center"}}>
        <button onClick={handleReset} style={{background:"none",color:"#e53935",border:"1px solid #ffcdd2",borderRadius:"10px",padding:"8px 20px",fontWeight:"700",fontSize:"12px",cursor:"pointer"}}>🔄 データをリセット</button>
      </div>
    </div>
  );
}

// ─── History Tab ─────────────────────────────────────────────────────────
function HistoryTab({ data, park, onChange }) {
  const C = useC();
  const sc = { background:C.card, borderRadius:"14px", padding:"14px 16px", marginBottom:"12px", boxShadow:C.shadow };
  const [openLog, setOpenLog] = useState(null);

  const allAttrs = [...DATA.land, ...DATA.sea];
  const allRests = [...RESTAURANTS.land, ...RESTAURANTS.sea];
  const allHotels = [...HOTELS.land, ...HOTELS.sea];
  const tripLogs = [...(data.tripLogs||[])].sort((a,b)=>b.date.localeCompare(a.date));
  const deleteLog = (idx) => {
    const logs = [...(data.tripLogs||[])];
    logs.splice(data.tripLogs.length - 1 - idx, 1);
    onChange("tripLogs", logs);
    if (openLog===idx) setOpenLog(null);
  };

  return (
    <div>
      {/* 旅の記録 */}
      {tripLogs.length>0&&(
        <div style={{marginBottom:"12px"}}>
          <p style={{fontSize:"15px",fontWeight:"800",color:C.text,marginBottom:"10px"}}>📖 旅の記録</p>
          {tripLogs.map((log,idx)=>{
            const parkName = log.park==="land"?"🏰 ランド":"🌊 シー";
            const logAttrs = (log.ridden||[]).map(id=>allAttrs.find(a=>a.id===id)).filter(Boolean);
            const logRests = (log.eaten||[]).map(id=>allRests.find(r=>r.id===id)).filter(Boolean);
            const logHotels = (log.stayed||[]).map(id=>allHotels.find(h=>h.id===id)).filter(Boolean);
            const isOpen = openLog===idx;
            const summary = [logAttrs.length>0&&`🎡 ${logAttrs.length}件`, logRests.length>0&&`🍴 ${logRests.length}件`, logHotels.length>0&&`🏨 ${logHotels.length}件`].filter(Boolean).join(" · ");
            return (
              <div key={idx} style={{...sc,padding:"0",overflow:"hidden"}}>
                <div onClick={()=>setOpenLog(isOpen?null:idx)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"14px 16px",cursor:"pointer"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:"800",fontSize:"14px",color:C.text}}>{log.date} {parkName}</div>
                    <div style={{fontSize:"12px",color:C.sub,marginTop:"2px"}}>{summary||"記録なし"}{log.memo?" · メモあり":""}</div>
                  </div>
                  <span style={{color:C.sub,fontSize:"14px"}}>{isOpen?"▲":"▼"}</span>
                </div>
                {isOpen&&(
                  <div style={{padding:"0 16px 14px",borderTop:`1px solid ${C.bd}`}}>
                    {log.memo&&<p style={{fontSize:"13px",color:C.text,lineHeight:1.7,padding:"12px 0",whiteSpace:"pre-wrap"}}>{log.memo}</p>}
                    {logAttrs.length>0&&(
                      <div style={{marginTop:"8px"}}>
                        <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"6px"}}>🎡 アトラクション</p>
                        {logAttrs.map(a=>(
                          <div key={a.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:`1px solid ${C.bd}`}}>
                            <span style={{fontSize:"16px"}}>{a.emoji}</span>
                            <span style={{fontSize:"13px",color:C.text,flex:1}}>{a.name}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {logRests.length>0&&(
                      <div style={{marginTop:"12px"}}>
                        <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"6px"}}>🍴 グルメ</p>
                        {logRests.map(r=>(
                          <div key={r.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:`1px solid ${C.bd}`}}>
                            <span style={{fontSize:"16px"}}>{r.emoji}</span>
                            <span style={{fontSize:"13px",color:C.text,flex:1}}>{r.name}</span>
                            <span style={{fontSize:"11px",color:C.sub}}>{r.price}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {logHotels.length>0&&(
                      <div style={{marginTop:"12px"}}>
                        <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"6px"}}>🛎️ ホテル</p>
                        {logHotels.map(h=>(
                          <div key={h.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"5px 0",borderBottom:`1px solid ${C.bd}`}}>
                            <span style={{fontSize:"16px"}}>{h.emoji}</span>
                            <span style={{fontSize:"13px",color:C.text,flex:1}}>{h.name}</span>
                            <span style={{fontSize:"11px",color:C.sub}}>{h.price}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <button onClick={()=>deleteLog(idx)} style={{marginTop:"12px",background:"#fce4ec",color:"#e57373",border:"none",borderRadius:"8px",padding:"7px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>🗑 この記録を削除</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tripLogs.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:"40px"}}><p style={{fontSize:"40px"}}>🏰</p><p style={{fontSize:"14px",marginTop:"8px"}}>当日タブで「この日を記録する」を押すと<br/>ここに旅の記録が残ります</p></div>}
    </div>
  );
}

// ─── Map Tab ──────────────────────────────────────────────────────────────
function MapTab({ data, park, onOpen }) {
  const C = useC();
  const [selectedArea, setSelectedArea] = useState(null);
  const [areaTab, setAreaTab] = useState("attr"); // "attr" | "rest"
  const areas = MAP_AREAS[park];
  const attrs = DATA[park];
  const restaurants = RESTAURANTS[park];
  const mapUsers = data.users || INITIAL_DATA.users;
  const wantList = attrs.filter(a=>(data.plan||{})[a.id]);
  const favRestaurants = restaurants.filter(r=>(data.restaurantFavorites||{})[r.id]);
  const getWantCount = (areaName) => wantList.filter(a=>a.area===areaName).length;
  const getFavRestCount = (areaName) => favRestaurants.filter(r=>r.area===areaName).length;
  const getAreaAttrs = (areaName) => attrs.filter(a=>a.area===areaName);
  const getAreaWant = (areaName) => wantList.filter(a=>a.area===areaName);
  const getAreaRests = (areaName) => restaurants.filter(r=>r.area===areaName);
  const getAreaFavRest = (areaName) => favRestaurants.filter(r=>r.area===areaName);
  const selectArea = (id) => { setSelectedArea(prev=>prev===id?null:id); setAreaTab("attr"); };
  const sc = { background:C.card, borderRadius:"14px", padding:"14px 16px", marginBottom:"12px", boxShadow:C.shadow };

  return (
    <div>
      <div style={sc}>
        <p style={{fontSize:"15px",fontWeight:"800",color:C.text,marginBottom:"10px",display:"flex",alignItems:"center",gap:"6px"}}>
          {park==="land"?"🏰 東京ディズニーランドマップ":"🌊 東京ディズニーシーマップ"}
          <span style={{fontSize:"11px",color:C.sub,fontWeight:"400"}}>エリアをタップ</span>
        </p>
        <svg viewBox={park==="sea"?"0 0 380 315":"0 0 380 275"} style={{width:"100%",height:"auto",cursor:"pointer"}}>
          <rect width="380" height={park==="sea"?315:275} fill={C.dark?"#1e3a5f":"#b3d9f5"} rx="10"/>
          {areas.map(a=>{
            const cnt = getWantCount(a.id);
            const rcnt = getFavRestCount(a.id);
            const sel = selectedArea===a.id;
            const hasBadge = cnt>0||rcnt>0;
            return (
              <g key={a.id} onClick={()=>selectArea(a.id)}>
                <polygon points={a.points} fill={a.color} stroke={sel?"#1a237e":"#fff"} strokeWidth={sel?"2.5":"1"} opacity="0.92"/>
                <text x={a.cx} y={hasBadge?a.cy-10:a.cy-4} textAnchor="middle" fontSize="8.5" fontWeight="bold" fill={a.textColor||"#333"}>{a.line1}</text>
                <text x={a.cx} y={hasBadge?a.cy+2:a.cy+8} textAnchor="middle" fontSize="8.5" fontWeight="bold" fill={a.textColor||"#333"}>{a.line2}</text>
                {cnt>0&&<>
                  <circle cx={rcnt>0?a.cx-10:a.cx} cy={a.cy+14} r="9" fill="#f5a623"/>
                  <text x={rcnt>0?a.cx-10:a.cx} y={a.cy+18} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#fff">{cnt}</text>
                </>}
                {rcnt>0&&<>
                  <circle cx={cnt>0?a.cx+10:a.cx} cy={a.cy+14} r="9" fill="#e65100"/>
                  <text x={cnt>0?a.cx+10:a.cx} y={a.cy+18} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#fff">{rcnt}</text>
                </>}
              </g>
            );
          })}
          <text x="190" y={park==="sea"?"310":"272"} textAnchor="middle" fontSize="9" fill={C.dark?"#9ca3af":"#555"}>{park==="sea"?"🌊":"🏰"} 入口ゲート</text>
        </svg>
        <div style={{fontSize:"11px",color:C.sub,marginTop:"8px",display:"flex",gap:"16px"}}>
          <span><span style={{background:"#f5a623",color:"#fff",borderRadius:"50%",padding:"0 5px",fontSize:"10px"}}>●</span> 当日計画</span>
          <span><span style={{background:"#e65100",color:"#fff",borderRadius:"50%",padding:"0 5px",fontSize:"10px"}}>●</span> グルメ</span>
        </div>
      </div>
      {selectedArea&&(()=>{
        const areaAttrs = getAreaAttrs(selectedArea);
        const areaWant = getAreaWant(selectedArea);
        const areaRests = getAreaRests(selectedArea);
        const areaFavRest = getAreaFavRest(selectedArea);
        return (
          <div style={{...sc,border:"2px solid #1a237e"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <p style={{fontWeight:"800",fontSize:"15px",color:C.text}}>{selectedArea}</p>
              <button onClick={()=>setSelectedArea(null)} style={{background:"none",border:"none",fontSize:"18px",cursor:"pointer",color:C.sub}}>×</button>
            </div>
            {/* タブ切り替え */}
            <div style={{display:"flex",background:C.muted,borderRadius:"10px",padding:"3px",marginBottom:"12px"}}>
              <button onClick={()=>setAreaTab("attr")} style={{flex:1,padding:"7px 0",border:"none",borderRadius:"8px",fontWeight:"700",fontSize:"13px",cursor:"pointer",background:areaTab==="attr"?(C.dark?"#374151":"#fff"):"transparent",color:areaTab==="attr"?(C.dark?"#f3f4f6":"#1a1a1a"):(C.dark?"#6b7280":"#888"),boxShadow:areaTab==="attr"?"0 1px 4px rgba(0,0,0,0.12)":"none"}}>
                🎡 アトラクション <span style={{fontSize:"11px",color:areaTab==="attr"?"#1976d2":C.sub}}>({areaAttrs.length})</span>
              </button>
              <button onClick={()=>setAreaTab("rest")} style={{flex:1,padding:"7px 0",border:"none",borderRadius:"8px",fontWeight:"700",fontSize:"13px",cursor:"pointer",background:areaTab==="rest"?(C.dark?"#374151":"#fff"):"transparent",color:areaTab==="rest"?(C.dark?"#f3f4f6":"#1a1a1a"):(C.dark?"#6b7280":"#888"),boxShadow:areaTab==="rest"?"0 1px 4px rgba(0,0,0,0.12)":"none"}}>
                🍴 レストラン <span style={{fontSize:"11px",color:areaTab==="rest"?"#e65100":C.sub}}>({areaRests.length})</span>
              </button>
            </div>

            {areaTab==="attr"&&<>
              {areaWant.length>0&&(
                <div style={{marginBottom:"10px"}}>
                  <p style={{fontSize:"12px",fontWeight:"700",color:"#1976d2",marginBottom:"6px"}}>📅 当日計画中</p>
                  {areaWant.map(a=>(
                    <div key={a.id} onClick={()=>onOpen(a)} style={{display:"flex",alignItems:"center",gap:"8px",background:"#e3f2fd",borderRadius:"10px",padding:"8px 12px",marginBottom:"4px",cursor:"pointer"}}>
                      <span style={{fontSize:"18px"}}>{a.emoji}</span>
                      <div><div style={{fontWeight:"700",fontSize:"13px",color:"#1976d2"}}>{a.name}</div><div style={{fontSize:"11px",color:"#888"}}>{a.dur}</div></div>
                    </div>
                  ))}
                </div>
              )}
              <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"6px"}}>全アトラクション</p>
              {areaAttrs.map(a=>{
                const inPlan=!!(data.plan||{})[a.id];
                const done=mapUsers.every(u=>data.ridden[a.id]?.[u.id]);
                return (
                  <div key={a.id} onClick={()=>onOpen(a)} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>
                    <span style={{fontSize:"16px"}}>{a.emoji}</span>
                    <span style={{flex:1,fontSize:"13px",fontWeight:inPlan?"700":"400",color:inPlan?"#1976d2":C.text}}>{a.name}</span>
                    {done&&<span style={{color:"#4caf50",fontSize:"13px"}}>✓</span>}
                  </div>
                );
              })}
            </>}

            {areaTab==="rest"&&<>
              {areaFavRest.length>0&&(
                <div style={{marginBottom:"10px"}}>
                  <p style={{fontSize:"12px",fontWeight:"700",color:"#e65100",marginBottom:"6px"}}>⭐ グルメ計画中</p>
                  {areaFavRest.map(r=>{
                    const eaten=(data.restaurantVisited||{})[r.id];
                    return (
                      <div key={r.id} onClick={()=>window.open(r.link,'_blank')} style={{display:"flex",alignItems:"center",gap:"8px",background:"#fff3e0",borderRadius:"10px",padding:"8px 12px",marginBottom:"4px",cursor:"pointer"}}>
                        <span style={{fontSize:"18px"}}>{r.emoji}</span>
                        <div style={{flex:1}}><div style={{fontWeight:"700",fontSize:"13px",color:"#e65100",textDecoration:"underline",textDecorationColor:"#ffb74d"}}>{r.name}</div><div style={{fontSize:"11px",color:"#888"}}>{r.price}</div></div>
                        {eaten&&<span style={{color:"#4caf50",fontWeight:"700",fontSize:"14px"}}>✓</span>}
                        <span style={{fontSize:"11px",color:"#ffb74d",flexShrink:0}}>›</span>
                      </div>
                    );
                  })}
                </div>
              )}
              <p style={{fontSize:"12px",fontWeight:"700",color:C.sub,marginBottom:"6px"}}>全レストラン</p>
              {areaRests.length===0&&<p style={{fontSize:"13px",color:C.sub,padding:"8px 0"}}>このエリアにレストランはありません</p>}
              {areaRests.map(r=>{
                const fav=(data.restaurantFavorites||{})[r.id];
                const eaten=(data.restaurantVisited||{})[r.id];
                return (
                  <div key={r.id} onClick={()=>window.open(r.link,'_blank')} style={{display:"flex",alignItems:"center",gap:"8px",padding:"7px 0",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>
                    <span style={{fontSize:"16px"}}>{r.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"13px",fontWeight:fav?"700":"400",color:fav?"#e65100":"#1976d2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:"underline",textDecorationColor:"#bbb"}}>{r.name}</div>
                      <div style={{fontSize:"11px",color:C.sub}}>{r.cat} · {r.price}</div>
                    </div>
                    {fav&&<span style={{fontSize:"11px",color:"#e65100",fontWeight:"700",flexShrink:0}}>⭐</span>}
                    {eaten&&<span style={{color:"#4caf50",fontWeight:"700",fontSize:"14px",flexShrink:0}}>✓</span>}
                    <span style={{fontSize:"11px",color:"#aaa",flexShrink:0}}>›</span>
                  </div>
                );
              })}
            </>}
          </div>
        );
      })()}
    </div>
  );
}

// ─── Restaurant Tab ────────────────────────────────────────────────────────
function RestaurantTab({ data, park, onChange }) {
  const C = useC();
  const [filter, setFilter] = useState("all");
  const [animId, setAnimId] = useState(null);
  const restaurants = RESTAURANTS[park];
  const filtered = restaurants.filter(r=>filter==="all"||r.cat===filter);
  const cats = [...new Set(restaurants.map(r=>r.cat))];
  const favs = data.restaurantFavorites||{};
  const toggleFav = (id) => {
    onChange("restaurantFavorites",{...favs,[id]:!favs[id]});
    setAnimId(id); setTimeout(()=>setAnimId(null),400);
  };
  const sc = { background:C.card, borderRadius:"14px", padding:"14px 16px", marginBottom:"12px", boxShadow:C.shadow };
  return (
    <div>
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"10px"}}>
        <button style={S.chip(filter==="all",C)} onClick={()=>setFilter("all")}>すべて</button>
        {cats.map(c=><button key={c} style={S.chip(filter===c,C)} onClick={()=>setFilter(c)}>{c}</button>)}
      </div>
      {filtered.map(r=>(
        <div key={r.id} style={sc}>
          <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
            <span style={{fontSize:"28px"}}>{r.emoji}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontWeight:"700",fontSize:"14px",flex:1,color:C.text}}>{r.name}</span>
                <button onClick={()=>toggleFav(r.id)} className={animId===r.id?"heart-anim":""}
                  style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:favs[r.id]?"#e53935":"#ddd",flexShrink:0,padding:"0 0 0 8px",lineHeight:1}}>♥</button>
              </div>
              <p style={{fontSize:"11px",color:C.sub,margin:"2px 0"}}>{r.area} · {r.cat} · {r.price}</p>
              <p style={{fontSize:"12px",color:C.sub,lineHeight:1.5,marginBottom:"10px"}}>{r.desc}</p>
              <a href={r.link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                <div style={{background:"#f0f4ff",borderRadius:"10px",padding:"10px",textAlign:"center",color:"#3949ab",fontWeight:"600",fontSize:"13px"}}>🔗 公式サイトで詳細を見る</div>
              </a>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Hotel Tab ────────────────────────────────────────────────────────────
function HotelTab({ data, park, onChange }) {
  const C = useC();
  const [filter, setFilter] = useState("all");
  const [animId, setAnimId] = useState(null);
  const favs = data.hotelFavorites||{};
  const hotels = HOTELS[park];
  const hotelTypes = [...new Set(hotels.map(h=>h.type))];
  const filtered = hotels.filter(h=>filter==="all"||h.type===filter);
  const toggleFav = (id) => {
    onChange("hotelFavorites",{...favs,[id]:!favs[id]});
    setAnimId(id); setTimeout(()=>setAnimId(null),400);
  };
  const sc = { background:C.card, borderRadius:"14px", padding:"14px 16px", marginBottom:"12px", boxShadow:C.shadow };
  const favCount = hotels.filter(h=>favs[h.id]).length;
  return (
    <div>
      {favCount>0&&(
        <div style={{background:C.dark?"#1e3a2e":"#f0fdf4",border:"1px solid #86efac",borderRadius:"14px",padding:"12px 16px",marginBottom:"12px",display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"24px"}}>♥</span>
          <div>
            <div style={{fontWeight:"700",fontSize:"13px",color:C.dark?"#86efac":"#166534"}}>{favCount}件のホテルをお気に入り済み</div>
            <div style={{fontSize:"11px",color:C.sub,marginTop:"2px"}}>♥ マークで管理できます</div>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",marginBottom:"10px"}}>
        <button style={S.chip(filter==="all",C)} onClick={()=>setFilter("all")}>すべて</button>
        {hotelTypes.map(t=><button key={t} style={S.chip(filter===t,C)} onClick={()=>setFilter(t)}>{t}</button>)}
      </div>
      {filtered.map(h=>(
        <div key={h.id} style={{...sc,border:favs[h.id]?`2px solid #e53935`:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
            <span style={{fontSize:"28px"}}>{h.emoji}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontWeight:"700",fontSize:"14px",flex:1,color:C.text}}>{h.name}</span>
                <button onClick={()=>toggleFav(h.id)} className={animId===h.id?"heart-anim":""}
                  style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:favs[h.id]?"#e53935":"#ddd",flexShrink:0,padding:"0 0 0 8px",lineHeight:1}}>♥</button>
              </div>
              <p style={{fontSize:"11px",margin:"4px 0 2px",display:"flex",alignItems:"center",gap:"6px"}}>
                {(()=>{
                  const tc = h.type==="ディズニーオフィシャルホテル"
                    ? {bg:"#fff8e1",color:"#f57f17",bd:"#ffe082"}
                    : h.type==="オフィシャルホテル"
                    ? {bg:"#e8f0fe",color:"#1a56db",bd:"#a8c7fa"}
                    : {bg:"#f0fdf4",color:"#166534",bd:"#86efac"};
                  return <span style={{background:tc.bg,color:tc.color,border:`1px solid ${tc.bd}`,borderRadius:"6px",padding:"1px 6px",fontWeight:"600",fontSize:"10px",whiteSpace:"nowrap"}}>{h.type}</span>;
                })()}
                <span style={{color:C.sub}}>{h.price}</span>
              </p>
              <p style={{fontSize:"12px",color:C.sub,lineHeight:1.5,marginBottom:"10px"}}>{h.desc}</p>
              <a href={h.link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                <div style={{background:"#f0f4ff",borderRadius:"10px",padding:"10px",textAlign:"center",color:"#3949ab",fontWeight:"600",fontSize:"13px"}}>🔗 公式サイトで詳細を見る</div>
              </a>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
const NAV = [
  { key:"list",       icon:"🎡", label:"一覧" },
  { key:"day",        icon:"📅", label:"当日" },
  { key:"restaurant", icon:"🍴", label:"グルメ" },
  { key:"hotel",      icon:"🛎️", label:"ホテル" },
  { key:"map",        icon:"🗺️", label:"マップ" },
  { key:"history",    icon:"⭐", label:"履歴" },
];

function DisneyTripPlanner() {
  const [appData, setAppData] = useState(()=>loadData());
  const [tab, setTab] = useState("list");
  const [selectedAttr, setSelectedAttr] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const park = appData.park;
  const users = appData.users || INITIAL_DATA.users;
  const dark = appData.darkMode;

  useEffect(()=>{ saveData(appData); }, [appData]);
  useEffect(()=>{ document.body.style.background = dark ? '#111827' : '#f5f7fa'; }, [dark]);
  const handleChange = useCallback((key,value)=>setAppData(prev=>({...prev,[key]:value})),[]);
  const setPark = (p)=>handleChange("park",p);
  const toggleDark = ()=>handleChange("darkMode",!dark);
  const countdown = calcCountdown(appData.tripDate);

  const attrs = DATA[park];
  const wantList = attrs.filter(a=>(appData.plan||{})[a.id]);
  const bothWantCount = attrs.filter(a=>users.every(u=>appData.want[a.id]?.[u.id])).length;
  const riddenCount = attrs.filter(a=>users.every(u=>appData.ridden[a.id]?.[u.id])).length;

  const headerBg = dark ? '#1f2937' : '#fff';
  const navBg = dark ? '#1f2937' : '#fff';
  const navBd = dark ? '#374151' : '#e8e8e8';
  const textColor = dark ? '#f3f4f6' : '#1a1a1a';
  const subColor = dark ? '#9ca3af' : '#888';
  const parkTabsBg = dark ? '#374151' : '#f0f0f0';
  const statBoxBg = dark ? '#1f2937' : '#fff';
  const contentBg = dark ? '#111827' : '#f5f7fa';

  return (
    <DarkCtx.Provider value={dark}>
      <div style={{minHeight:"100vh",background:contentBg,fontFamily:"-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif",color:textColor,paddingBottom:"72px"}}>
        {/* Header */}
        <div style={{background:headerBg,boxShadow:`0 1px 0 ${navBd}`,position:"sticky",top:0,zIndex:100,paddingTop:"env(safe-area-inset-top,0px)"}}>
          <div style={{padding:"14px 16px 0",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <div style={{fontSize:"22px",fontWeight:"800",color:textColor,textAlign:"center"}}>✨ Disney Trip Planner</div>
              <div style={{position:"absolute",right:"0",display:"flex",gap:"6px"}}>
                <button onClick={toggleDark} style={{background:"none",border:"none",fontSize:"18px",cursor:"pointer"}} title="ダークモード">{dark?"☀️":"🌙"}</button>
                <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#888"}}>⚙️</button>
              </div>
            </div>
            {countdown!==null&&<div style={{fontSize:"12px",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:"4px",marginTop:"2px",paddingBottom:"10px"}}>
              <span style={{background:"#e3f2fd",color:"#1976d2",borderRadius:"10px",padding:"1px 8px",fontWeight:"700"}}>{countdown>0?`あと${countdown}日`:countdown===0?"今日！🎉":`${Math.abs(countdown)}日前`}</span>
            </div>}
          </div>
          <div style={{padding:"0 12px 12px"}}>
            <div style={{display:"flex",background:parkTabsBg,borderRadius:"12px",padding:"4px"}}>
              <button style={S.parkTabBtn(park==="land",dark)} onClick={()=>setPark("land")}>🏰 ランド</button>
              <button style={S.parkTabBtn(park==="sea",dark)} onClick={()=>setPark("sea")}>🌊 シー</button>
            </div>
          </div>
          {/* Stats */}
          <div style={{display:"flex",gap:"8px",padding:"0 12px 12px"}}>
            {[[attrs.length,"総数","#1976d2"],[bothWantCount,users.length===1?"行く！":"全員とも","#f57c00"],[wantList.length,"予定","#00897b"],[riddenCount,"訪問済","#388e3c"]].map(([v,l,c])=>(
              <div key={l} style={{background:statBoxBg,borderRadius:"12px",padding:"10px 4px",textAlign:"center",flex:1,boxShadow:`0 1px 4px rgba(0,0,0,${dark?0.3:0.06})`}}>
                <div style={{fontSize:"22px",fontWeight:"800",color:c}}>{v}</div>
                <div style={{fontSize:"10px",color:subColor,marginTop:"2px"}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Content */}
        <div style={{padding:"12px"}}>
          {tab==="list"&&<AttractionsTab data={appData} park={park} onOpen={setSelectedAttr} onChange={handleChange}/>}
          {tab==="day"&&<DayTab data={appData} park={park} onOpen={setSelectedAttr} onChange={handleChange}/>}
          {tab==="restaurant"&&<RestaurantTab data={appData} park={park} onChange={handleChange}/>}
          {tab==="hotel"&&<HotelTab data={appData} park={park} onChange={handleChange}/>}
          {tab==="map"&&<MapTab data={appData} park={park} onOpen={setSelectedAttr}/>}
          {tab==="history"&&<HistoryTab data={appData} park={park} onChange={handleChange}/>}
        </div>

        {/* Bottom Nav */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"500px",background:navBg,borderTop:`1px solid ${navBd}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
          {NAV.map(t=>(
            <button key={t.key} style={S.navBtn(tab===t.key,dark)} onClick={()=>setTab(t.key)}>
              <span style={{fontSize:"20px",lineHeight:1}}>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>

        {selectedAttr&&<AttrModal attr={selectedAttr} data={appData} onClose={()=>setSelectedAttr(null)} onChange={handleChange}/>}
        {showSettings&&<SettingsModal data={appData} onClose={()=>setShowSettings(false)} onChange={handleChange}/>}
      </div>
    </DarkCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DisneyTripPlanner/>);
</script>
</body>
</html>
